version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow
      POSTGRES_DB: leadflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://leadflow:leadflow@db:5432/leadflow
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pgdata:
